<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI Dashboard</title>
    <!-- Korrigierter Link zur PapaParse Bibliothek -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-buy: #22c55e;
            --accent-sell: #ef4444;
            --accent-ignore: #64748b;
            --border-color: #334155;
            --source-bg: #0ea5e9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            color: #38bdf8;
        }

        .status-bar {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 5px;
        }

        .card-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .signal-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .signal-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            border-radius: 4px 0 0 4px;
        }

        .card-buy::before { background-color: var(--accent-buy); }
        .card-sell::before { background-color: var(--accent-sell); }
        .card-ignore::before { background-color: var(--accent-ignore); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .ticker-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ticker {
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
        }

        .source-tag {
            background: var(--source-bg);
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .action-badge {
            font-weight: bold;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .badge-buy { background: rgba(34, 197, 94, 0.2); color: var(--accent-buy); border: 1px solid var(--accent-buy); }
        .badge-sell { background: rgba(239, 68, 68, 0.2); color: var(--accent-sell); border: 1px solid var(--accent-sell); }
        .badge-ignore { background: rgba(100, 116, 139, 0.1); color: var(--text-dim); border: 1px solid var(--border-color); }

        .summary {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 15px;
            color: #e2e8f0;
        }

        .footer-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            color: var(--text-dim);
        }

        .source-link {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
        }

        #loading { margin-top: 50px; color: var(--text-dim); }
    </style>
</head>
<body>

    <header>
        <h1>Sentinel Radar</h1>
        <div class="status-bar" id="status">Verbinde mit Satellit...</div>
    </header>

    <div id="loading">Lade Marktdaten...</div>
    <div class="card-container" id="cards"></div>

    <script>
        const CSV_FILENAME = 'signals_log.csv';

        async function loadData() {
            try {
                // Erstellt eine absolute URL basierend auf dem aktuellen Standort, 
                // um Parsing-Fehler in geschützten Umgebungen zu vermeiden.
                let fetchUrl;
                if (window.location.protocol === 'blob:') {
                    // Fallback für Blob-Umgebungen (Vorschau)
                    fetchUrl = CSV_FILENAME + '?t=' + Date.now();
                } else {
                    const baseUrl = window.location.href.split('?')[0].split('#')[0];
                    const baseDir = baseUrl.substring(0, baseUrl.lastIndexOf('/') + 1);
                    fetchUrl = new URL(CSV_FILENAME, baseDir).href + '?t=' + Date.now();
                }

                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error('Datenquelle konnte nicht erreicht werden');
                const csvText = await response.text();
                
                if (typeof Papa === 'undefined') {
                    throw new Error('PapaParse Bibliothek wurde nicht geladen');
                }

                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        renderCards(results.data.reverse());
                    }
                });
            } catch (err) {
                console.error('Radar-Fehler:', err);
                document.getElementById('status').textContent = '⚠️ Fehler: ' + err.message;
            }
        }

        function renderCards(data) {
            const container = document.getElementById('cards');
            const loading = document.getElementById('loading');
            const status = document.getElementById('status');
            
            loading.style.display = 'none';
            container.innerHTML = '';
            status.textContent = 'Letzter Scan: ' + new Date().toLocaleTimeString();

            if (data.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:var(--text-dim)">Keine Daten in der CSV gefunden.</div>';
                return;
            }

            data.forEach(row => {
                const action = (row['Handlung'] || 'IGNORIEREN').toUpperCase();
                const ticker = row['Ticker'] || '-';
                const source = row['Quelle'] || 'Unbekannt';
                const url = row['Original-Quelle'] || '#';
                const summary = row['Zusammenfassung'] || '';
                const time = row['Zeitstempel (UTC)'] || '';
                const model = row['KI-Modell'] || '';

                let cardType = 'card-ignore';
                let badgeType = 'badge-ignore';
                if (action === 'KAUFEN') { cardType = 'card-buy'; badgeType = 'badge-buy'; }
                if (action === 'VERKAUFEN') { cardType = 'card-sell'; badgeType = 'badge-sell'; }

                const card = document.createElement('div');
                card.className = `signal-card ${cardType}`;
                card.innerHTML = `
                    <div class="card-header">
                        <div class="ticker-box">
                            <span class="ticker">${ticker}</span>
                            <span class="source-tag">${source}</span>
                        </div>
                        <span class="action-badge ${badgeType}">${action}</span>
                    </div>
                    <div class="summary">${summary}</div>
                    <div class="footer-meta">
                        <span>${time} UTC | ${model}</span>
                        <a href="${url}" target="_blank" class="source-link">Quelle ↗</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Initialer Start
        loadData();
        // Alle 30 Sekunden aktualisieren
        setInterval(loadData, 30000);
    </script>
</body>
</html>
