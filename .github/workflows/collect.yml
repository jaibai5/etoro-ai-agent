name: Gemini Data Collector

on:
  schedule:
    - cron: '*/15 * * * *'  # Läuft ressourcenschonend alle 15 Minuten
  workflow_dispatch:        # Erlaubt manuellen Start per Klick

permissions:
  contents: write           # WICHTIG: Erlaubt dem Bot, die CSV-Datei ins Repo zu speichern

jobs:
  collect-data:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: SDK installieren
        run: pip install -r requirements.txt

      - name: Gemini Prüf-Bot ausführen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python testbot_search.py

      - name: Ergebnisse ins Repository speichern (Commit & Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 1. Prüfen, ob die CSV-Datei existiert
          if [ -f signals_log.csv ]; then
            git add signals_log.csv
            # 2. Prüfen, ob neue Zeilen dazugekommen sind. Wenn ja, hochladen.
            git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Neues Marktsignal protokolliert" && git push)
          else
            echo "ℹ️ Markt ruhig (Sonntag): Keine CSV-Datei zum Speichern vorhanden."
          fi
